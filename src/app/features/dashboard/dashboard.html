<header class="topbar">
  <div class="topbar__brand">
    <span class="topbar__mark">⚡</span>
    <span class="topbar__name">GridPulse</span>
  </div>
  <nav class="topbar__nav">
    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Devices</a
    >
    <a routerLink="/dashboard/alerts" routerLinkActive="active">Alerts</a>
  </nav>
  <div class="topbar__user">
    @if (user(); as u) {
      <span class="topbar__username">{{ u.username }}</span>
      <span class="topbar__role" [class.topbar__role--admin]="isAdmin()">{{ u.role }}</span>
    }
    <button type="button" class="topbar__logout" (click)="logout()">Log out</button>
  </div>
</header>

<main class="content">
  <router-outlet />
</main>
